  # ── video_categories ────────────────────────────────────────────
  - name: video_categories
    description: YouTube video category definitions
    guide: |
      Lists video categories available in a given region.
      Provide `region_code` (defaults to US) or `id` to look up specific categories.
    filters:
      - name: region_code
        required: false
        description: ISO 3166-1 alpha-2 country code (default US).
      - name: id
        required: false
        description: Comma-separated category IDs.
    request:
      method: GET
      path: /videoCategories
      query:
        - name: key
          from: input
          key: YOUTUBE_API_KEY
        - name: part
          from: literal
          value: snippet
        - name: regionCode
          from: filter
          key: region_code
        - name: id
          from: filter
          key: id
    response:
      rows_path:
        - items
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: The video category ID
      - name: title
        type: Utf8
        nullable: true
        description: Name of the video category
        expr:
          kind: path
          path:
            - snippet
            - title
      - name: channel_id
        type: Utf8
        nullable: true
        description: Channel ID associated with this category
        expr:
          kind: path
          path:
            - snippet
            - channelId
      - name: assignable
        type: Boolean
        nullable: true
        description: Whether videos can be assigned to this category
        expr:
          kind: path
          path:
            - snippet
            - assignable
      - name: region_code
        type: Utf8
        nullable: true
        virtual: true
        description: Filter by region code.
        expr:
          kind: from_filter
          key: region_code
      - name: category_id
        type: Utf8
        nullable: true
        virtual: true
        description: Filter by category ID(s).
        expr:
          kind: from_filter
          key: id
      - name: raw
        type: Json
        nullable: false
        description: Complete raw video category object from the YouTube Data API
        expr:
          kind: current_row
